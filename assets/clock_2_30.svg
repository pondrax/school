<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Clock face -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="black" stroke-width="3"/>
  <!-- Tick marks -->
  <line x1="100" y1="8" x2="100" y2="20" stroke="black" stroke-width="2"/>
  <line x1="148" y1="14" x2="143" y2="25" stroke="black" stroke-width="1.5"/>
  <line x1="183" y1="52" x2="173" y2="58" stroke="black" stroke-width="1.5"/>
  <line x1="192" y1="100" x2="180" y2="100" stroke="black" stroke-width="2"/>
  <line x1="183" y1="148" x2="173" y2="142" stroke="black" stroke-width="1.5"/>
  <line x1="148" y1="186" x2="143" y2="175" stroke="black" stroke-width="1.5"/>
  <line x1="100" y1="192" x2="100" y2="180" stroke="black" stroke-width="2"/>
  <line x1="52" y1="186" x2="57" y2="175" stroke="black" stroke-width="1.5"/>
  <line x1="17" y1="148" x2="27" y2="142" stroke="black" stroke-width="1.5"/>
  <line x1="8" y1="100" x2="20" y2="100" stroke="black" stroke-width="2"/>
  <line x1="17" y1="52" x2="27" y2="58" stroke="black" stroke-width="1.5"/>
  <line x1="52" y1="14" x2="57" y2="25" stroke="black" stroke-width="1.5"/>
  <!-- Numbers -->
  <text x="100" y="38" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">12</text>
  <text x="140" y="42" text-anchor="middle" font-size="14" font-family="Arial">1</text>
  <text x="166" y="68" text-anchor="middle" font-size="14" font-family="Arial">2</text>
  <text x="175" y="105" text-anchor="middle" font-size="14" font-family="Arial">3</text>
  <text x="166" y="142" text-anchor="middle" font-size="14" font-family="Arial">4</text>
  <text x="140" y="168" text-anchor="middle" font-size="14" font-family="Arial">5</text>
  <text x="100" y="175" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">6</text>
  <text x="60" y="168" text-anchor="middle" font-size="14" font-family="Arial">7</text>
  <text x="34" y="142" text-anchor="middle" font-size="14" font-family="Arial">8</text>
  <text x="25" y="105" text-anchor="middle" font-size="14" font-family="Arial">9</text>
  <text x="34" y="68" text-anchor="middle" font-size="14" font-family="Arial">10</text>
  <text x="60" y="42" text-anchor="middle" font-size="14" font-family="Arial">11</text>
  <!-- Minute hand at 6 (pointing down, 180°) -->
  <line x1="100" y1="100" x2="100" y2="170" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Hour hand between 2 and 3 (75° from 12): x=100+50*sin(75°)=148, y=100-50*cos(75°)=87 -->
  <line x1="100" y1="100" x2="148" y2="87" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="black"/>
</svg>
